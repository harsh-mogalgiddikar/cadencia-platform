# ═══════════════════════════════════════════════════════════════
# Cadencia — CI/CD Pipeline
# Runs on every push + PR to main/develop
# Gates: quality → tests → security → build → deploy
# context.md §10: all infra in ap-south-1
# ═══════════════════════════════════════════════════════════════

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: cadencia-api

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── Job 1: Code Quality ──────────────────────────────────────
  quality:
    name: "🔍 Code Quality"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install linters
        run: pip install ruff bandit

      - name: Ruff lint
        run: ruff check src/ --output-format=github

      - name: Ruff format check
        run: ruff format --check src/

      - name: Bandit security scan
        run: |
          bandit -r src/ -ll -f json -o bandit-report.json || true
          # Fail only on HIGH severity:
          bandit -r src/ -ll --severity-level high

      - name: Secrets scan (grep)
        run: |
          # Ensure no hardcoded secrets in source
          ! grep -rn 'MNEMONIC\|PRIVATE_KEY\|sk_live\|password\s*=' src/ \
            --include="*.py" | grep -v "# " | grep -v "test" | grep -v "example"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: quality-reports
          path: "*.json"

  # ── Job 2: Unit Tests ────────────────────────────────────────
  unit-tests:
    name: "🧪 Unit Tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -e ".[dev]" 2>/dev/null || pip install -e .
          pip install pytest pytest-anyio pytest-asyncio pytest-cov

      - name: Run unit tests
        run: |
          pytest tests/unit/ \
            --tb=short -q \
            --cov=src \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            -x
        env:
          LLM_PROVIDER: stub
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          REDIS_URL: "redis://localhost:6379/0"
          JWT_PRIVATE_KEY: "test-key"
          JWT_PUBLIC_KEY: "test-key"
          ALGORAND_ALGOD_ADDRESS: "http://localhost:4001"
          ALGORAND_ALGOD_TOKEN: "aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa"
          ALGORAND_ESCROW_CREATOR_MNEMONIC: "test"

      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ── Job 3: Integration Tests ─────────────────────────────────
  integration-tests:
    name: "🔗 Integration Tests"
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: cadencia_test
          POSTGRES_USER: cadencia
          POSTGRES_PASSWORD: testpassword
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U cadencia"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -e ".[dev]" 2>/dev/null || pip install -e .
          pip install pytest pytest-anyio pytest-asyncio

      - name: Run migrations
        run: python -m alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://cadencia:testpassword@localhost:5432/cadencia_test

      - name: Run integration tests
        run: pytest tests/integration/ --tb=short -q -x
        env:
          DATABASE_URL: postgresql+asyncpg://cadencia:testpassword@localhost:5432/cadencia_test
          REDIS_URL: redis://localhost:6379/0
          LLM_PROVIDER: stub
          ALGORAND_ALGOD_ADDRESS: ""
          ESCROW_DRY_RUN_ENABLED: "true"
          JWT_PRIVATE_KEY: "test-key"
          JWT_PUBLIC_KEY: "test-key"

  # ── Job 4: Security Scan ─────────────────────────────────────
  security-scan:
    name: "🛡️ Security Scan"
    runs-on: ubuntu-latest
    needs: [quality]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build --target production -t cadencia:${{ github.sha }} .

      - name: Verify non-root user
        run: |
          USER_ID=$(docker run --rm cadencia:${{ github.sha }} id -u)
          if [ "$USER_ID" = "0" ]; then
            echo "ERROR: Container running as root!"
            exit 1
          fi
          echo "OK: running as uid=$USER_ID"

      - name: Verify app imports
        run: |
          docker run --rm \
            -e DATABASE_URL="sqlite+aiosqlite:///:memory:" \
            -e REDIS_URL="redis://localhost:6379/0" \
            -e JWT_PRIVATE_KEY="test" \
            -e JWT_PUBLIC_KEY="test" \
            -e LLM_PROVIDER="stub" \
            cadencia:${{ github.sha }} \
            python -c "from main import create_app; print('OK')"

      - name: Trivy CVE scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: cadencia:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: 1
          format: sarif
          output: trivy-results.sarif

      - name: pip-audit
        run: |
          pip install pip-audit
          pip-audit --requirement <(docker run --rm cadencia:${{ github.sha }} pip freeze) || true

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  # ── Job 5: Build + Push to ECR ───────────────────────────────
  build-push:
    name: "📦 Build & Push"
    runs-on: ubuntu-latest
    needs: [quality, unit-tests, integration-tests, security-scan]
    if: github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read
    outputs:
      image_tag: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/cadencia-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push
        run: |
          IMAGE="${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}"
          docker build --target production \
            -t ${IMAGE}:${{ github.sha }} \
            -t ${IMAGE}:latest \
            --cache-from ${IMAGE}:latest \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            .
          docker push ${IMAGE}:${{ github.sha }}
          docker push ${IMAGE}:latest

      - name: Trigger ECR image scan
        run: |
          aws ecr start-image-scan \
            --repository-name ${{ env.ECR_REPOSITORY }} \
            --image-id imageTag=${{ github.sha }} \
            --region ${{ env.AWS_REGION }}

  # ── Job 6: Deploy to Production ──────────────────────────────
  deploy-production:
    name: "🚀 Deploy Production"
    runs-on: ubuntu-latest
    needs: [build-push]
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/cadencia-deployer
          aws-region: ${{ env.AWS_REGION }}

      - name: Run database migration (ECS run-task)
        run: |
          TASK_ARN=$(aws ecs run-task \
            --cluster cadencia-production \
            --task-definition cadencia-migration \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={
              subnets=[${{ secrets.PRIVATE_SUBNET_IDS }}],
              securityGroups=[${{ secrets.ECS_SECURITY_GROUP }}],
              assignPublicIp=DISABLED
            }" \
            --query 'tasks[0].taskArn' --output text)
          echo "Migration task: $TASK_ARN"
          # Wait for completion
          aws ecs wait tasks-stopped --cluster cadencia-production --tasks $TASK_ARN
          # Verify exit code
          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster cadencia-production --tasks $TASK_ARN \
            --query 'tasks[0].containers[0].exitCode' --output text)
          if [ "$EXIT_CODE" != "0" ]; then
            echo "Migration failed with exit code $EXIT_CODE"
            exit 1
          fi

      - name: Update ECS service (rolling deploy)
        run: |
          IMAGE="${{ secrets.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}"
          # Update service with new image
          aws ecs update-service \
            --cluster cadencia-production \
            --service cadencia-api-service \
            --force-new-deployment \
            --deployment-configuration \
              "minimumHealthyPercent=100,maximumPercent=200"
          # Wait for stability
          aws ecs wait services-stable \
            --cluster cadencia-production \
            --services cadencia-api-service

      - name: Post-deploy smoke test
        run: |
          sleep 30
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            https://${{ secrets.PRODUCTION_DOMAIN }}/health)
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Smoke test failed: HTTP $HTTP_CODE"
            exit 1
          fi
          echo "Smoke test passed: HTTP 200"

      - name: Notify deployment
        if: always()
        run: |
          STATUS="${{ job.status }}"
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"text\":\"🚀 Cadencia deploy ${STATUS}: \`${{ github.sha }}\`\"}" || true
