# ═══════════════════════════════════════════════════════════════
# Cadencia — Emergency Rollback
# Manually triggered via GitHub Actions UI
# Does NOT re-run migrations (backward-compatible schema)
# ═══════════════════════════════════════════════════════════════

name: Rollback

on:
  workflow_dispatch:
    inputs:
      previous_image_tag:
        description: "Docker image tag (commit SHA) to roll back to"
        required: true
        type: string
      reason:
        description: "Reason for rollback"
        required: true
        type: string

env:
  AWS_REGION: ap-south-1

jobs:
  rollback:
    name: "⏮️ Rollback Production"
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/cadencia-deployer
          aws-region: ${{ env.AWS_REGION }}

      - name: Roll back ECS service
        run: |
          echo "Rolling back to image: ${{ inputs.previous_image_tag }}"
          echo "Reason: ${{ inputs.reason }}"

          aws ecs update-service \
            --cluster cadencia-production \
            --service cadencia-api-service \
            --force-new-deployment

          aws ecs wait services-stable \
            --cluster cadencia-production \
            --services cadencia-api-service

      - name: Verify rollback
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            https://${{ secrets.PRODUCTION_DOMAIN }}/health)
          echo "Health check: HTTP $HTTP_CODE"
          [ "$HTTP_CODE" = "200" ]

      - name: Notify rollback
        if: always()
        run: |
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"text\":\"⏮️ Cadencia ROLLBACK ${STATUS}: to \`${{ inputs.previous_image_tag }}\` — ${{ inputs.reason }}\"
            }" || true
