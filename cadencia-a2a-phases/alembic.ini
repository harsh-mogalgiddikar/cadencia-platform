# Alembic configuration for Cadencia
# context.md §15: Alembic migrations must be idempotent; scripts/migrate.py safe at startup.

[alembic]
# Path to migration scripts
script_location = alembic

# Template for new revision files
file_template = %%(rev)s_%%(slug)s

# Timezone for revision timestamps
timezone = UTC

# Max length for revision slug
truncate_slug_length = 40

# DATABASE_URL is injected from environment in alembic/env.py
# Do NOT set sqlalchemy.url here — it would expose credentials.
# sqlalchemy.url is read from DATABASE_URL env var in env.py.

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
